name: England WC Hub - Daily News Crawler

on:
  schedule:
    # Trigger 5 times per day matching UK BST daily slots:
    # 07:00 BST = 06:00 UTC
    # 11:00 BST = 10:00 UTC
    # 14:30 BST = 13:30 UTC
    # 18:00 BST = 17:00 UTC
    # 21:30 BST = 20:30 UTC
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '30 12 * * *'
    - cron: '0 16 * * *'
    - cron: '30 19 * * *'
  workflow_dispatch:
    # Allows manual triggering directly from the GitHub Actions tab

permissions:
  contents: write

jobs:
  research-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Execute News Research Crawler
      run: python scripts/research_camp_news.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if data.js was modified
        git status --porcelain
        
        if [ -n "$(git status --porcelain data.js)" ]; then
          echo "Changes detected in data.js. Staging, committing, and pushing..."
          git add data.js
          git commit -m "data: automatic 5x daily camp news research update [skip ci]"
          git push origin englandwc
        else
          echo "No news changes detected. Skipping commit."
        fi
