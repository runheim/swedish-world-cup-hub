name: Sweden WC Hub - Daily News Crawler

on:
  schedule:
    # Trigger 5 times per day matching US Eastern daily slots (Host Country Time):
    # 07:00 EDT = 11:00 UTC
    # 11:00 EDT = 15:00 UTC
    # 14:30 EDT = 18:30 UTC
    # 18:00 EDT = 22:00 UTC
    # 21:30 EDT = 01:30 UTC (next day)
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '30 18 * * *'
    - cron: '0 22 * * *'
    - cron: '30 1 * * *'
  workflow_dispatch:
    # Allows manual triggering directly from the GitHub Actions tab

permissions:
  contents: write

jobs:
  research-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install deep-translator

    - name: Execute News Research Crawler
      run: python scripts/research_camp_news.py

    - name: Sync data.js into dist/ (so Cloudflare serves fresh data without a full rebuild)
      run: |
        mkdir -p dist
        cp data.js dist/data.js
        echo "Copied updated data.js -> dist/data.js"

    - name: Commit and Push Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Check if data.js or dist/data.js was modified
        git status --porcelain

        if [ -n "$(git status --porcelain data.js dist/data.js)" ]; then
          echo "Changes detected. Staging, committing, and pushing..."
          git add data.js dist/data.js
          git commit -m "data: automatic 5x daily camp news research update"
          git push origin swedenwc
        else
          echo "No news changes detected. Skipping commit."
        fi
